<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1080" viewBox="0 0 1200 1080" role="img" aria-labelledby="title desc">
  <title id="title">Renato Grasso terminal — session continued</title>
  <desc id="desc">Continuation of the terminal profile: whoami, stack, focus, telemetry.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070a"/>
      <stop offset="48%" stop-color="#08110d"/>
      <stop offset="100%" stop-color="#05070a"/>
    </linearGradient>

    <linearGradient id="pulse-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0"/>
      <stop offset="45%" stop-color="#34d399" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1612"/>
      <stop offset="100%" stop-color="#070d0b"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#143628" opacity=".55"/>
    </pattern>

    <clipPath id="frame"><rect x="58" y="20" width="1084" height="1040" rx="22"/></clipPath>

    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .prompt { font-size: 19px; fill: #34d399; font-weight: 700; }
      .cmd    { font-size: 19px; fill: #c9d1d9; }
      .text   { font-size: 16px; fill: #c9d1d9; }
      .key    { font-size: 16px; fill: #5eead4; }
      .val    { font-size: 16px; fill: #f0fdf4; }
      .muted  { font-size: 14px; fill: #6b7280; }
      .label  { font-size: 13px; fill: #8b949e; letter-spacing: .12em; }
      .ok     { fill: #22c55e; font-weight: 700; }
      .bad    { fill: #ef4444; font-weight: 700; }
      .warn   { fill: #fbbf24; }
      .accent { fill: #34d399; }
      .tiny   { font-size: 13px; fill: #5eead4; opacity: .6; }
      .hdr    { font-size: 14px; fill: #34d399; font-weight: 800; letter-spacing: .22em; }
      .item   { font-size: 15px; fill: #d1fae5; }
      .item-dim { font-size: 15px; fill: #94a3b8; }
      .blink  { animation: blink 1.1s steps(1) infinite; }
      .scan   { animation: scan 6s linear infinite; }
      .dash   { stroke-dasharray: 14 12; animation: dash 12s linear infinite; }
      .fade-1 { animation: fade 1s ease-out .1s both; }
      .fade-2 { animation: fade 1s ease-out .35s both; }
      .fade-3 { animation: fade 1s ease-out .6s both; }
      .fade-4 { animation: fade 1s ease-out .85s both; }
      .grow   { transform-origin: left; animation: grow 1.1s cubic-bezier(.2,.7,.2,1) .5s both; }
      @keyframes blink { 0%,48%{opacity:1} 49%,100%{opacity:.12} }
      @keyframes scan  { from{transform:translateY(-260px)} to{transform:translateY(1080px)} }
      @keyframes dash  { to{stroke-dashoffset:-260} }
      @keyframes fade  { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
      @keyframes grow  { from{transform:scaleX(0)} to{transform:scaleX(1)} }
    </style>
  </defs>

  <rect width="1200" height="1080" fill="#05070a"/>
  <rect width="1200" height="1080" fill="url(#bg)"/>

  <!-- corner grid + dots ambience -->
  <g opacity=".18">
    <path d="M0 80 H1200 M0 200 H1200 M0 320 H1200 M0 440 H1200 M0 560 H1200 M0 680 H1200 M0 800 H1200 M0 920 H1200 M0 1040 H1200" stroke="#0f3a28" stroke-width="1"/>
    <path d="M120 0 V1080 M240 0 V1080 M360 0 V1080 M480 0 V1080 M600 0 V1080 M720 0 V1080 M840 0 V1080 M960 0 V1080 M1080 0 V1080" stroke="#0f3a28" stroke-width="1"/>
  </g>

  <!-- main terminal frame (continuation, no titlebar) -->
  <rect x="58" y="20" width="1084" height="1040" rx="22" fill="#07100c" stroke="#164e36" stroke-width="2"/>
  <rect x="58" y="20" width="1084" height="1040" rx="22" fill="url(#dots)" opacity=".4"/>

  <g clip-path="url(#frame)">
    <rect class="scan" x="58" y="0" width="1084" height="160" fill="url(#pulse-line)" opacity=".18"/>
    <path class="dash" d="M86 1040 H1114" stroke="#22c55e" stroke-width="1.5" opacity=".3"/>
  </g>

  <!-- top status strip inside frame -->
  <g class="mono">
    <text x="92" y="56" class="muted">~/profile</text>
    <text x="200" y="56" class="muted">·</text>
    <text x="218" y="56" class="muted">session restored</text>
    <text x="380" y="56" class="muted">·</text>
    <text x="398" y="56" class="muted">tmux 0:0</text>
    <circle cx="1100" cy="50" r="4" fill="#22c55e"><animate attributeName="opacity" values="1;.3;1" dur="1.6s" repeatCount="indefinite"/></circle>
    <text x="1042" y="56" class="label">ONLINE</text>
  </g>

  <!-- ================== SECTION 1 — whoami ================== -->
  <g class="mono fade-1">
    <text x="92" y="106" class="prompt">guest@grasso</text>
    <text x="220" y="106" class="cmd">:~/profile$ whoami --verbose</text>
  </g>

  <g class="mono fade-2">
    <rect x="92" y="124" width="1016" height="218" rx="10" fill="url(#panel)" stroke="#1f3b2c"/>
    <rect x="92" y="124" width="4" height="218" fill="#34d399"/>

    <g transform="translate(118 154)">
      <text x="0"   y="0"  class="key">name</text>      <text x="160" y="0"  class="val">Renato Grasso</text>
      <text x="0"   y="28" class="key">role</text>      <text x="160" y="28" class="val">QA Engineer</text>      <text x="318" y="28" class="muted">@Keeggo</text>
      <text x="0"   y="56" class="key">location</text>  <text x="160" y="56" class="val">São Vicente / SP — Brazil</text>
      <text x="0"   y="84" class="key">timezone</text>  <text x="160" y="84" class="val">UTC-3</text>
      <text x="0"   y="112" class="key">status</text>   <text x="160" y="112" class="val">breaking things on purpose, then fixing them</text>
      <text x="0"   y="140" class="key">mission</text>  <text x="160" y="140" class="val">ship software that does not page anyone at 3am</text>
      <text x="0"   y="168" class="key">contact</text>  <text x="160" y="168" class="val">renatograsso95@gmail.com</text>
    </g>
  </g>

  <!-- ================== SECTION 2 — stack ================== -->
  <g class="mono fade-3">
    <text x="92" y="392" class="prompt">guest@grasso</text>
    <text x="220" y="392" class="cmd">:~/profile$ ls -la stack/</text>
    <text x="430" y="392" class="muted">// 4 directories, 18 tools</text>
  </g>

  <!-- 4 column panel with ASCII headers -->
  <g class="mono fade-4" transform="translate(92 408)">
    <!-- col 1 automation -->
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="244" height="220" rx="10" fill="url(#panel)" stroke="#1f3b2c"/>
      <rect x="0" y="0" width="244" height="32" rx="10" fill="#0f2f22"/>
      <rect x="0" y="22" width="244" height="10" fill="#0f2f22"/>
      <text x="16" y="22" class="hdr">▌ AUTOMATION</text>
      <text x="222" y="22" class="muted" text-anchor="end">04</text>
      <g transform="translate(20 60)">
        <text x="0"  y="0"  class="accent">▸</text> <text x="22" y="0"  class="item">playwright</text>
        <text x="0"  y="28" class="accent">▸</text> <text x="22" y="28" class="item">cypress</text>
        <text x="0"  y="56" class="accent">▸</text> <text x="22" y="56" class="item">selenium</text>
        <text x="0"  y="84" class="accent">▸</text> <text x="22" y="84" class="item">appium</text>
      </g>
      <text x="20" y="200" class="muted">e2e · ui · mobile</text>
    </g>

    <!-- col 2 api/perf -->
    <g transform="translate(258 0)">
      <rect x="0" y="0" width="244" height="220" rx="10" fill="url(#panel)" stroke="#1f3b2c"/>
      <rect x="0" y="0" width="244" height="32" rx="10" fill="#0f2f22"/>
      <rect x="0" y="22" width="244" height="10" fill="#0f2f22"/>
      <text x="16" y="22" class="hdr">▌ API / PERF</text>
      <text x="222" y="22" class="muted" text-anchor="end">04</text>
      <g transform="translate(20 60)">
        <text x="0"  y="0"  class="accent">▸</text> <text x="22" y="0"  class="item">restassured</text>
        <text x="0"  y="28" class="accent">▸</text> <text x="22" y="28" class="item">karate dsl</text>
        <text x="0"  y="56" class="accent">▸</text> <text x="22" y="56" class="item">postman</text>
        <text x="0"  y="84" class="accent">▸</text> <text x="22" y="84" class="item">k6</text>
      </g>
      <text x="20" y="200" class="muted">contracts · load · slo</text>
    </g>

    <!-- col 3 languages -->
    <g transform="translate(516 0)">
      <rect x="0" y="0" width="244" height="220" rx="10" fill="url(#panel)" stroke="#1f3b2c"/>
      <rect x="0" y="0" width="244" height="32" rx="10" fill="#0f2f22"/>
      <rect x="0" y="22" width="244" height="10" fill="#0f2f22"/>
      <text x="16" y="22" class="hdr">▌ LANGUAGES</text>
      <text x="222" y="22" class="muted" text-anchor="end">06</text>
      <g transform="translate(20 60)">
        <text x="0"  y="0"   class="accent">▸</text> <text x="22" y="0"   class="item">typescript</text>
        <text x="0"  y="24"  class="accent">▸</text> <text x="22" y="24"  class="item">javascript</text>
        <text x="0"  y="48"  class="accent">▸</text> <text x="22" y="48"  class="item">java</text>
        <text x="0"  y="72"  class="accent">▸</text> <text x="22" y="72"  class="item">python</text>
        <text x="0"  y="96"  class="accent">▸</text> <text x="22" y="96"  class="item">ruby</text>
        <text x="0"  y="120" class="accent">▸</text> <text x="22" y="120" class="item">c</text>
      </g>
    </g>

    <!-- col 4 delivery -->
    <g transform="translate(774 0)">
      <rect x="0" y="0" width="244" height="220" rx="10" fill="url(#panel)" stroke="#1f3b2c"/>
      <rect x="0" y="0" width="244" height="32" rx="10" fill="#0f2f22"/>
      <rect x="0" y="22" width="244" height="10" fill="#0f2f22"/>
      <text x="16" y="22" class="hdr">▌ DELIVERY</text>
      <text x="222" y="22" class="muted" text-anchor="end">05</text>
      <g transform="translate(20 60)">
        <text x="0"  y="0"   class="accent">▸</text> <text x="22" y="0"   class="item">docker</text>
        <text x="0"  y="24"  class="accent">▸</text> <text x="22" y="24"  class="item">jenkins</text>
        <text x="0"  y="48"  class="accent">▸</text> <text x="22" y="48"  class="item">azure devops</text>
        <text x="0"  y="72"  class="accent">▸</text> <text x="22" y="72"  class="item">gitlab ci</text>
        <text x="0"  y="96"  class="accent">▸</text> <text x="22" y="96"  class="item">gh actions</text>
      </g>
      <text x="20" y="200" class="muted">ci · cd · containers</text>
    </g>
  </g>

  <!-- ================== SECTION 3 — focus diff ================== -->
  <g class="mono fade-1">
    <text x="92" y="690" class="prompt">guest@grasso</text>
    <text x="220" y="690" class="cmd">:~/profile$ git diff --focus HEAD~1</text>
  </g>

  <g class="mono fade-2">
    <rect x="92" y="708" width="1016" height="200" rx="10" fill="url(#panel)" stroke="#1f3b2c"/>
    <rect x="92" y="708" width="4" height="200" fill="#22c55e"/>

    <g transform="translate(118 738)">
      <text x="0" y="0"   filter="url(#glow)"><tspan class="ok">+</tspan>  <tspan class="text">test automation that catches regressions before deploy</tspan></text>
      <text x="0" y="26"  filter="url(#glow)"><tspan class="ok">+</tspan>  <tspan class="text">API, mobile and web quality pipelines end-to-end</tspan></text>
      <text x="0" y="52"  filter="url(#glow)"><tspan class="ok">+</tspan>  <tspan class="text">performance budgets and SLO thinking with k6</tspan></text>
      <text x="0" y="78"  filter="url(#glow)"><tspan class="ok">+</tspan>  <tspan class="text">backend labs: APIs, containers, observability</tspan></text>
      <text x="0" y="104" class="muted">─────────────────────────────────────────────────────────</text>
      <text x="0" y="130" filter="url(#glow)"><tspan class="bad">-</tspan>  <tspan class="text">flaky tests, manual smoke runs, "works on my machine"</tspan></text>
    </g>
  </g>

  <!-- ================== SECTION 4 — telemetry intro ================== -->
  <g class="mono fade-3">
    <text x="92" y="958" class="prompt">guest@grasso</text>
    <text x="220" y="958" class="cmd">:~/profile$ ./telemetry --live</text>
    <text x="500" y="958" class="warn">⟶</text>
    <text x="528" y="958" class="muted">streaming below</text>
    <rect class="blink" x="660" y="942" width="11" height="20" fill="#34d399"/>
  </g>

  <!-- bottom status bar -->
  <g class="mono">
    <rect x="76" y="998" width="1048" height="42" rx="10" fill="#0d1612" stroke="#1f3b2c"/>
    <text x="96" y="1024" class="label">▌ STATUS</text>
    <text x="180" y="1024" class="text" font-size="14">building</text>
    <text x="262" y="1024" class="muted">·</text>
    <text x="280" y="1024" class="text" font-size="14">learning</text>
    <text x="362" y="1024" class="muted">·</text>
    <text x="380" y="1024" class="text" font-size="14">breaking</text>
    <text x="462" y="1024" class="muted">·</text>
    <text x="480" y="1024" class="text" font-size="14">shipping</text>

    <text x="700" y="1024" class="label">UPTIME</text>
    <text x="770" y="1024" class="text" font-size="14">∞</text>

    <text x="820" y="1024" class="label">EXIT</text>
    <text x="870" y="1024" class="ok" font-size="14">0</text>

    <circle cx="1090" cy="1018" r="4" fill="#34d399" class="blink"/>
    <text x="1010" y="1024" class="label">REC</text>
  </g>
</svg>

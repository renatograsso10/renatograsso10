<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Renato Grasso terminal profile</title>
  <desc id="desc">Animated hacker terminal profile for Renato Grasso, QA Engineer at Keeggo.</desc>

  <defs>
    <linearGradient id="term-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070a"/>
      <stop offset="48%" stop-color="#08110d"/>
      <stop offset="100%" stop-color="#05070a"/>
    </linearGradient>

    <linearGradient id="pulse-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0"/>
      <stop offset="45%" stop-color="#34d399" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </linearGradient>

    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="typed-line">
      <rect x="232" y="263" width="0" height="34">
        <animate attributeName="width" from="0" to="755" dur="4.2s" begin="1.3s" fill="freeze"/>
      </rect>
    </clipPath>

    <clipPath id="window-clip">
      <rect x="58" y="54" width="1084" height="412" rx="22"/>
    </clipPath>

    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .tiny { font-size: 15px; fill: #5eead4; opacity: .75; }
      .prompt { font-size: 20px; fill: #34d399; }
      .muted { fill: #8b949e; }
      .text { fill: #c9d1d9; }
      .ok { fill: #22c55e; }
      .warn { fill: #fbbf24; }
      .name { font-size: 68px; font-weight: 800; fill: #f8fafc; letter-spacing: 0; }
      .role { font-size: 25px; fill: #34d399; font-weight: 700; }
      .typed { font-size: 24px; fill: #c9d1d9; }
      .chip-text { font-size: 15px; fill: #d1fae5; font-weight: 700; }
      .label { font-size: 14px; fill: #8b949e; }
      .metric { font-size: 18px; fill: #e2e8f0; font-weight: 700; }
      .cursor { fill: #34d399; animation: blink 1s steps(1) infinite; }
      .scan { animation: scan 4.8s linear infinite; }
      .matrix { animation: drift 16s linear infinite; }
      .matrix-slow { animation: drift 24s linear infinite reverse; }
      .glitch-a { animation: glitch-a 4.5s steps(1) infinite; fill: #67e8f9; opacity: .32; }
      .glitch-b { animation: glitch-b 5.8s steps(1) infinite; fill: #f472b6; opacity: .22; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .dash { stroke-dasharray: 16 14; animation: dash 10s linear infinite; }
      .blink-dot { animation: blink 1.2s steps(1) infinite; }
      @keyframes blink { 0%, 48% { opacity: 1; } 49%, 100% { opacity: .12; } }
      @keyframes scan { from { transform: translateY(-420px); } to { transform: translateY(420px); } }
      @keyframes drift { from { transform: translateY(-80px); } to { transform: translateY(160px); } }
      @keyframes glitch-a {
        0%, 90%, 100% { transform: translate(0, 0); opacity: .12; }
        91% { transform: translate(3px, -1px); opacity: .42; }
        92% { transform: translate(-4px, 1px); opacity: .28; }
        93% { transform: translate(0, 0); opacity: .12; }
      }
      @keyframes glitch-b {
        0%, 82%, 100% { transform: translate(0, 0); opacity: .10; }
        83% { transform: translate(-3px, 2px); opacity: .34; }
        84% { transform: translate(4px, -2px); opacity: .22; }
        85% { transform: translate(0, 0); opacity: .10; }
      }
      @keyframes pulse { 0%, 100% { opacity: .55; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -240; } }
    </style>
  </defs>

  <rect width="1200" height="520" fill="#05070a"/>
  <rect width="1200" height="520" fill="url(#term-bg)"/>

  <g opacity=".22">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200 M0 320 H1200 M0 400 H1200 M0 480 H1200" stroke="#123626" stroke-width="1"/>
    <path d="M80 0 V520 M160 0 V520 M240 0 V520 M320 0 V520 M400 0 V520 M480 0 V520 M560 0 V520 M640 0 V520 M720 0 V520 M800 0 V520 M880 0 V520 M960 0 V520 M1040 0 V520 M1120 0 V520" stroke="#123626" stroke-width="1"/>
  </g>

  <g class="mono matrix" opacity=".32">
    <text x="48" y="40" class="tiny">01001010 01110001 01000001 00100000 01100111 01100001 01110100 01100101</text>
    <text x="76" y="98" class="tiny">trace: api.spec.ok coverage.delta +13 perf.p95 watch</text>
    <text x="790" y="62" class="tiny">assert.strict pass pass pass quarantine=false</text>
    <text x="820" y="150" class="tiny">docker logs --tail 80 quality-pipeline</text>
  </g>

  <g class="mono matrix-slow" opacity=".20">
    <text x="52" y="442" class="tiny">100101 // backend lab // handlers // contracts // load probes</text>
    <text x="748" y="408" class="tiny">latency budget: p95 p99 error-rate throughput</text>
    <text x="880" y="480" class="tiny">commit graph syncing...</text>
  </g>

  <rect x="58" y="54" width="1084" height="412" rx="22" fill="#07100c" stroke="#164e36" stroke-width="2"/>
  <rect x="58" y="54" width="1084" height="48" rx="22" fill="#0d1612"/>
  <rect x="58" y="88" width="1084" height="14" fill="#0d1612"/>

  <circle cx="88" cy="78" r="7" fill="#ef4444"/>
  <circle cx="112" cy="78" r="7" fill="#f59e0b"/>
  <circle cx="136" cy="78" r="7" fill="#22c55e"/>
  <text x="172" y="84" class="mono muted" font-size="15">quality-shell.exe --profile renatograsso10 --mode terminal</text>

  <g clip-path="url(#window-clip)">
    <rect class="scan" x="58" y="54" width="1084" height="95" fill="url(#pulse-line)" opacity=".24"/>
    <path class="dash" d="M86 438 H1114" stroke="#22c55e" stroke-width="2" opacity=".34"/>
  </g>

  <g class="mono" filter="url(#soft-glow)">
    <text x="88" y="142" class="prompt">$ ./boot-profile.sh</text>

    <text x="88" y="178" font-size="18" class="text">
      <tspan class="ok">[ OK ]</tspan>
      <tspan dx="10">automation stack online</tspan>
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.08;1" dur="1.6s" fill="freeze"/>
    </text>

    <text x="88" y="210" font-size="18" class="text">
      <tspan class="ok">[ OK ]</tspan>
      <tspan dx="10">quality gates armed</tspan>
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.22;1" dur="1.9s" fill="freeze"/>
    </text>

    <text x="88" y="242" font-size="18" class="text">
      <tspan class="ok">[ OK ]</tspan>
      <tspan dx="10">backend lab attached</tspan>
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.34;1" dur="2.2s" fill="freeze"/>
    </text>

    <text x="88" y="274" font-size="18" class="text">
      <tspan class="warn">[ RUN ]</tspan>
      <tspan dx="10">typing identity stream...</tspan>
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.46;1" dur="2.5s" fill="freeze"/>
    </text>

    <text x="486" y="186" class="name glitch-a">Renato Grasso</text>
    <text x="486" y="186" class="name glitch-b">Renato Grasso</text>
    <text x="486" y="186" class="name">Renato Grasso</text>
    <text x="492" y="226" class="role">QA Engineer @Keeggo</text>

    <text x="232" y="288" class="prompt">$</text>
    <g clip-path="url(#typed-line)">
      <text x="264" y="288" class="typed">building automation, quality gates, perf probes and backend labs</text>
    </g>
    <rect class="cursor" x="264" y="265" width="13" height="28">
      <animate attributeName="x" from="264" to="980" dur="4.2s" begin="1.3s" fill="freeze"/>
    </rect>
  </g>

  <g class="mono">
    <g transform="translate(88 326)">
      <rect width="122" height="32" rx="8" fill="#0f2f22" stroke="#2dd4bf" opacity=".88"/>
      <text x="16" y="21" class="chip-text">Playwright</text>
    </g>
    <g transform="translate(222 326)">
      <rect width="98" height="32" rx="8" fill="#0f2f22" stroke="#2dd4bf" opacity=".88"/>
      <text x="16" y="21" class="chip-text">Cypress</text>
    </g>
    <g transform="translate(332 326)">
      <rect width="106" height="32" rx="8" fill="#0f2f22" stroke="#2dd4bf" opacity=".88"/>
      <text x="16" y="21" class="chip-text">Selenium</text>
    </g>
    <g transform="translate(450 326)">
      <rect width="68" height="32" rx="8" fill="#0f2f22" stroke="#2dd4bf" opacity=".88"/>
      <text x="16" y="21" class="chip-text">k6</text>
    </g>
    <g transform="translate(530 326)">
      <rect width="126" height="32" rx="8" fill="#0f2f22" stroke="#2dd4bf" opacity=".88"/>
      <text x="16" y="21" class="chip-text">RestAssured</text>
    </g>
    <g transform="translate(668 326)">
      <rect width="104" height="32" rx="8" fill="#0f2f22" stroke="#2dd4bf" opacity=".88"/>
      <text x="16" y="21" class="chip-text">Docker</text>
    </g>
    <g transform="translate(784 326)">
      <rect width="46" height="32" rx="8" fill="#0f2f22" stroke="#2dd4bf" opacity=".88"/>
      <text x="16" y="21" class="chip-text">JS</text>
    </g>
    <g transform="translate(842 326)">
      <rect width="46" height="32" rx="8" fill="#0f2f22" stroke="#2dd4bf" opacity=".88"/>
      <text x="14" y="21" class="chip-text">TS</text>
    </g>
    <g transform="translate(900 326)">
      <rect width="68" height="32" rx="8" fill="#0f2f22" stroke="#2dd4bf" opacity=".88"/>
      <text x="15" y="21" class="chip-text">Java</text>
    </g>
    <g transform="translate(980 326)">
      <rect width="44" height="32" rx="8" fill="#0f2f22" stroke="#2dd4bf" opacity=".88"/>
      <text x="17" y="21" class="chip-text">C</text>
    </g>
  </g>

  <g class="mono" transform="translate(88 388)">
    <text x="0" y="0" class="label">automation</text>
    <rect x="0" y="12" width="245" height="10" rx="5" fill="#10251c"/>
    <rect x="0" y="12" width="0" height="10" rx="5" fill="#34d399">
      <animate attributeName="width" from="0" to="224" dur="1.2s" begin="1.1s" fill="freeze"/>
    </rect>
    <text x="262" y="22" class="metric">91%</text>

    <text x="380" y="0" class="label">api + perf</text>
    <rect x="380" y="12" width="245" height="10" rx="5" fill="#10251c"/>
    <rect x="380" y="12" width="0" height="10" rx="5" fill="#2dd4bf">
      <animate attributeName="width" from="0" to="205" dur="1.4s" begin="1.4s" fill="freeze"/>
    </rect>
    <text x="642" y="22" class="metric">84%</text>

    <text x="760" y="0" class="label">backend lab</text>
    <rect x="760" y="12" width="245" height="10" rx="5" fill="#10251c"/>
    <rect x="760" y="12" width="0" height="10" rx="5" fill="#a7f3d0">
      <animate attributeName="width" from="0" to="176" dur="1.6s" begin="1.7s" fill="freeze"/>
    </rect>
    <text x="1022" y="22" class="metric">72%</text>
  </g>

  <g class="mono pulse" opacity=".7">
    <circle cx="1088" cy="126" r="5" fill="#22c55e"/>
    <text x="1102" y="132" class="label">LIVE</text>
  </g>
</svg>
